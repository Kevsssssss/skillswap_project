{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap</title>
    <link rel="icon" href="data:,">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --ss-accent: #f0522a; }
        body { background-color: #f5f4f0; font-family: 'Inter', sans-serif; }
        .navbar { background: #1e293b !important; }
        .karma-pill { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 4px 12px; color: #fbbf24; font-size: 0.8rem; }
        .toast { background: #1e293b; color: white; border-radius: 12px; min-width: 300px; cursor: pointer; }
    </style>
</head>
<body>
    <audio id="global-notification-ping" preload="auto">
        <source src="{% static 'audio/notification.mp3' %}" type="audio/mpeg">
    </audio>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'service_list' %}" style="color: var(--ss-accent) !important;">SkillSwap</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav ms-auto align-items-center gap-3">
                    {% if user.is_authenticated %}
                        <li class="nav-item"><span class="karma-pill">★ {{ user.profile.karma_balance }} Karma</span></li>
                        <li class="nav-item"><a href="{% url 'service_list' %}" class="nav-link">Dashboard</a></li>
                        <li class="nav-item"><a href="{% url 'inbox' %}" class="nav-link">Messages</a></li>
                        <li class="nav-item">
                            <a href="{% url 'profile' %}" class="nav-link position-relative">
                                Profile
                                <span id="nav-notification-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                                      style="font-size: 0.6rem; {% if not notifications %}display:none;{% endif %}">
                                    {{ notifications|length }}
                                </span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <form action="{% url 'logout' %}" method="post">{% csrf_token %}
                                <button type="submit" class="btn btn-link nav-link p-0">Logout</button>
                            </form>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div id="toast-placement-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 2000;"></div>
    
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% if user.is_authenticated %}
    <script>
        {
            const notifyBadge = document.getElementById('nav-notification-badge');
            const pingSound = document.getElementById('global-notification-ping');
            const toastContainer = document.getElementById('toast-placement-container');

            const unlockAudio = () => {
                pingSound.play().then(() => { pingSound.pause(); pingSound.currentTime = 0; }).catch(e => {});
                document.removeEventListener('click', unlockAudio);
            };
            document.addEventListener('click', unlockAudio);

            const globalProtocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
            const notifySocket = new WebSocket(globalProtocol + window.location.host + '/ws/notifications/');

            notifySocket.onmessage = function(e) {
                const data = JSON.parse(e.data);
                
                // Suppress if on the same page
                if (window.location.pathname === data.target_url) return;

                pingSound.currentTime = 0;
                pingSound.play().catch(err => {});

                if (notifyBadge) {
                    let currentTotal = parseInt(notifyBadge.innerText) || 0;
                    notifyBadge.innerText = currentTotal + 1;
                    notifyBadge.style.display = 'block';
                }

                const toastId = `toast-${Date.now()}`;
                const toastHtml = `
                    <div id="${toastId}" class="toast show shadow-lg mb-2" role="alert">
                        <div class="toast-body d-flex justify-content-between align-items-center">
                            <div class="toast-body-text">${data.message}</div>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
                        </div>
                    </div>`;
                
                toastContainer.insertAdjacentHTML('beforeend', toastHtml);
                const newToast = document.getElementById(toastId);
                
                newToast.onclick = (event) => {
                    if (!event.target.classList.contains('btn-close') && data.target_url) {
                        window.location.href = data.target_url;
                    }
                };
                
                newToast.addEventListener('hidden.bs.toast', () => newToast.remove());
                setTimeout(() => { if(newToast) newToast.remove(); }, 8000);
            };
        }
    </script>
    {% endif %}
</body>
</html>
