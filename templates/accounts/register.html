{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center" style="min-height: 80vh; align-items: center;">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <div style="font-size: 2rem; font-weight: 800; letter-spacing: -1px; color: #f0522a;">SkillSwap</div>
            <p class="text-muted" style="font-size: 0.875rem;">Join the community. Earn with your skills.</p>
        </div>
        <div class="card border-0 shadow-sm" style="border-radius: 16px; overflow: hidden;">
            <div class="card-body p-4">
                <h5 class="fw-bold mb-1" style="letter-spacing: -0.3px;">Create your account</h5>
                <p class="text-muted mb-4" style="font-size: 0.85rem;">Free to join. Start earning Karma today.</p>
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary w-100 mt-2 py-2 fw-bold" style="border-radius: 10px;" type="submit">Sign Up</button>
                </form>
            </div>
            <div class="card-footer text-center bg-white border-0 pb-4 pt-0">
                <small class="text-muted">Already have an account? <a href="{% url 'login' %}" class="text-primary fw-bold text-decoration-none">Log in</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
