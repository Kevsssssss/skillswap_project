{% extends 'base.html' %}

{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap');

    .auth-wrap {
        min-height: 85vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-card {
        width: 100%;
        max-width: 420px;
        background: #ffffff;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 4px 6px rgba(0,0,0,0.04), 0 20px 60px rgba(0,0,0,0.08);
        animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .auth-header {
        background: #1e293b;
        padding: 2rem 2rem 1.75rem;
        position: relative;
        overflow: hidden;
    }

    .auth-header::before {
        content: '';
        position: absolute;
        top: -40px; right: -40px;
        width: 160px; height: 160px;
        border-radius: 50%;
        background: rgba(240, 82, 42, 0.15);
    }

    .auth-header::after {
        content: '';
        position: absolute;
        bottom: -60px; left: 20px;
        width: 120px; height: 120px;
        border-radius: 50%;
        background: rgba(255,255,255,0.04);
    }

    .auth-logo {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: 1.6rem;
        color: #f0522a;
        letter-spacing: -0.5px;
        position: relative;
        z-index: 1;
    }

    .auth-header h2 {
        font-family: 'Syne', sans-serif;
        font-weight: 700;
        font-size: 1.5rem;
        color: #ffffff;
        margin: 0.75rem 0 0.25rem;
        letter-spacing: -0.5px;
        position: relative;
        z-index: 1;
    }

    .auth-header p {
        font-family: 'DM Sans', sans-serif;
        color: rgba(255,255,255,0.5);
        font-size: 0.85rem;
        margin: 0;
        position: relative;
        z-index: 1;
    }

    .auth-body {
        padding: 2rem;
        font-family: 'DM Sans', sans-serif;
    }

    .auth-body label {
        font-size: 0.78rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: #64748b;
        margin-bottom: 0.4rem;
        display: block;
    }

    .auth-body input[type="text"],
    .auth-body input[type="password"] {
        width: 100%;
        padding: 0.7rem 1rem;
        border: 1.5px solid #e2e8f0;
        border-radius: 10px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.95rem;
        color: #1e293b;
        background: #f8fafc;
        transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        outline: none;
        margin-bottom: 1.2rem;
        box-sizing: border-box;
    }

    .auth-body input:focus {
        border-color: #f0522a;
        background: #ffffff;
        box-shadow: 0 0 0 3px rgba(240, 82, 42, 0.1);
    }

    .auth-body p { margin: 0; }

    .btn-auth {
        width: 100%;
        padding: 0.8rem;
        background: #f0522a;
        color: white;
        border: none;
        border-radius: 10px;
        font-family: 'Syne', sans-serif;
        font-weight: 700;
        font-size: 0.95rem;
        letter-spacing: 0.2px;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
        margin-top: 0.5rem;
    }

    .btn-auth:hover {
        background: #d94420;
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(240, 82, 42, 0.35);
    }

    .btn-auth:active { transform: translateY(0); }

    .auth-footer {
        text-align: center;
        padding: 1.25rem 2rem 1.75rem;
        border-top: 1px solid #f1f5f9;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.85rem;
        color: #94a3b8;
    }

    .auth-footer a {
        color: #f0522a;
        font-weight: 500;
        text-decoration: none;
    }

    .auth-footer a:hover { text-decoration: underline; }

    .error-alert {
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 10px;
        padding: 0.75rem 1rem;
        margin-bottom: 1.25rem;
        font-size: 0.85rem;
        color: #dc2626;
        font-family: 'DM Sans', sans-serif;
    }

    .divider {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin: 1.25rem 0;
    }

    .divider::before, .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: #e2e8f0;
    }

    .divider span {
        font-size: 0.75rem;
        color: #94a3b8;
        font-family: 'DM Sans', sans-serif;
    }
</style>

<div class="auth-wrap">
    <div class="auth-card">

        <div class="auth-header">
            <div class="auth-logo">SkillSwap</div>
            <h2>Welcome back</h2>
            <p>Sign in to your account to continue</p>
        </div>

        <div class="auth-body">
            {% if form.errors %}
            <div class="error-alert">
                ⚠ Invalid username or password. Please try again.
            </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" autofocus required>

                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" required placeholder="••••••••••">

                <button type="submit" class="btn-auth">Sign In →</button>
            </form>
        </div>

        <div class="auth-footer">
            Don't have an account? <a href="{% url 'register' %}">Create one free</a>
        </div>

    </div>
</div>
{% endblock %}
