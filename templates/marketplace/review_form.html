{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-sm" style="border-radius: 16px;">
            <div class="card-body p-4 p-md-5">
                <div class="mb-4">
                    <h4 class="fw-bold mb-1" style="letter-spacing: -0.3px;">Leave a review</h4>
                    <p class="text-muted" style="font-size: 0.875rem;">
                        How was your collaboration on <strong>"{{ transaction.service.title }}"</strong>?
                    </p>
                </div>
                <hr class="my-3">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold" style="font-size: 0.875rem;">Star Rating</label>
                        {{ form.rating }}
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold" style="font-size: 0.875rem;">Comments</label>
                        {{ form.comment }}
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-dark fw-bold py-2" style="border-radius: 10px;">Submit Review</button>
                        <a href="{% url 'profile' %}" class="btn btn-light" style="border-radius: 10px;">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
